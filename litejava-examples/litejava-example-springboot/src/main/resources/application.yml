# 服务器配置
server:
  port: 8080

# 数据源配置
datasource:
  url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
  username: sa
  password: ""
  driver: org.h2.Driver

# MyBatis 配置
mybatis:
  mapperPackage: example.mapper

# Guice DI 配置
guice:
  packages: example.service

# 定时任务（SpringBootConfApp 使用注解方式）
# scheduler:
#   packages: example.controller

# Spring MVC 配置（SpringBootApp 编程式设置，不需要这里配置）
# springmvc:
#   packages: example.controller

