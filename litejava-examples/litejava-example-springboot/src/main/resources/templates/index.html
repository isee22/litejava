<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">LiteJava</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .api { background: #f9f9f9; padding: 15px; border-radius: 5px; margin-top: 20px; }
        code { background: #eee; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1 th:text="${title}">LiteJava Spring Boot Style</h1>
    
    <h2>用户列表</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.email}"></td>
            </tr>
        </tbody>
    </table>
    
    <div class="api">
        <h3>API 接口</h3>
        <ul>
            <li><code>GET /api/users</code> - 获取用户列表</li>
            <li><code>GET /api/users/{id}</code> - 获取单个用户</li>
            <li><code>POST /api/users</code> - 创建用户</li>
            <li><code>PUT /api/users/{id}</code> - 更新用户</li>
            <li><code>DELETE /api/users/{id}</code> - 删除用户</li>
            <li><code>GET /health</code> - 健康检查</li>
        </ul>
    </div>
</body>
</html>
